tunnel: 200bb57a-3a5d-4459-9f3d-9bb4c736d49f
credentials-file: /etc/cloudflared/tunnel-creds.json

ingress:
  - hostname: ssh.algoxpert.tech
    service: tcp://localhost:2222
  - hostname: gitlab.algoxpert.tech
    service: http://localhost:8181
    originRequest:
      httpHostHeader: "gitlab.algoxpert.tech"
  - hostname: git.algoxpert.tech
    service: ssh://localhost:2224
  - hostname: idempiere.algoxpert.tech
    service: http://cpb-idempiere:8080
    originRequest:
      httpHostHeader: "idempiere.algoxpert.tech"
  - hostname: cpbpoc.algoxpert.tech
    service: http://cpb-client:3000
    originRequest:
      httpHostHeader: "cpbpoc.algoxpert.tech"
  - hostname: occ.algoxpert.tech
    service: http://k3d-occ-serverlb:80
    originRequest:
      httpHostHeader: "occ.algoxpert.tech"
  - hostname: occ-api.algoxpert.tech
    service: http://k3d-occ-serverlb:80
    originRequest:
      httpHostHeader: "occ-api.algoxpert.tech"
  - hostname: occ-grafana.algoxpert.tech
    service: http://k3d-occ-serverlb:80
    originRequest:
      httpHostHeader: "occ-grafana.algoxpert.tech"
  - hostname: exchange-next.algoxpert.tech
    service: http://mx-app:3000
  - service: http_status:404

# Use http2 — quic causes crashes on WSL2 network
protocol: http2
